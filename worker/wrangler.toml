name = "jarvis-worker"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

# ============================================
# СЕКРЕТЫ (wrangler secret put):
#   TELEGRAM_BOT_TOKEN     — токен публичного бота
#   GROQ_API_KEY           — ключ Groq
#   WEBHOOK_SECRET         — верификация вебхука
#   MY_TELEGRAM_ID         — твой user id
#   WORKER_API_SECRET      — секрет для API юзербота
# ============================================

[vars]
BOT_NAME = "Джарвис"
TIMEZONE_OFFSET = "3"

[[d1_databases]]
binding = "DB"
database_name = "jarvis-db"
database_id = "261b09d7-072f-432b-9b2d-7960ede802a5"
migrations_dir = "db/migrations"

[ai]
binding = "AI"

[triggers]
crons = ["* * * * *"]
